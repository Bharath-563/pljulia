name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Intel Architecture & Prevent OOM Crash
        run: |
          # 1. Force native Intel architecture
          sed -i 's/--platform=[^ ]*//g' Dockerfile
          sed -i 's|^FROM .*|FROM postgres:14|g' Dockerfile
          sed -i 's|https://julialang-s3.julialang.org/[^ ]*|https://julialang-s3.julialang.org/bin/linux/x64/1.10/julia-1.10.4-linux-x86_64.tar.gz|g' Dockerfile
          
          # 2. Empty the package list to prevent Out-Of-Memory (OOM) crashes during CI
          sed -i 's/^ENV PLJULIA_PACKAGES=.*/ENV PLJULIA_PACKAGES=""/g' Dockerfile

      - name: Build PL/Julia and Run Tests
        run: docker build -t pljulia-ci --progress=plain --no-cache .