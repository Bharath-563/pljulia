name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Native Intel Architecture
        run: |
          # 1. Wipe out whatever base image is written and force pure Intel PostgreSQL
          sed -i 's/^FROM .*/FROM postgres:14/g' Dockerfile
          
          # 2. Wipe out the Mac download URL and force the pure Intel Julia binary
          sed -i 's|https://julialang-s3.julialang.org/.*\.tar\.gz|https://julialang-s3.julialang.org/bin/linux/x64/1.10/julia-1.10.4-linux-x86_64.tar.gz|g' Dockerfile

      - name: Build PL/Julia and Run Tests
        run: docker build -t pljulia-ci --progress=plain --no-cache .