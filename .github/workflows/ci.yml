name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Adjust Dockerfile for x86_64 CI Runner
        run: |
          # 1. Strip the hardcoded ARM64 sha256 hash so Docker natively pulls an Intel base image
          sed -i 's/@sha256:[a-f0-9]*//g' Dockerfile
          # 2. Swap the Julia download URL from ARM to Intel
          sed -i 's/aarch64/x64/g' Dockerfile
          sed -i 's/linux-x64/linux-x86_64/g' Dockerfile

      - name: Build PL/Julia and Run Tests
        run: docker build -t pljulia-ci --progress=plain --no-cache .