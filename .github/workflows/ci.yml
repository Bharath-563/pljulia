name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Adjust Dockerfile for x86_64 CI Runner
        run: |
          # GitHub Actions uses Intel (x86_64) runners. 
          # This dynamically swaps the ARM architecture used for local Mac testing.
          sed -i 's/aarch64/x64/g' Dockerfile
          sed -i 's/linux-x64/linux-x86_64/g' Dockerfile

      - name: Build PL/Julia and Run Tests
        # The Dockerfile automatically compiles the C code and runs
        # `make installcheck` as its final step. If this command succeeds, the tests passed!
        run: docker build -t pljulia-ci .