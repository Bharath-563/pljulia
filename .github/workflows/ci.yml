name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Native Intel Build
        run: |
          # 1. Strip the Mac ARM platform flag so GitHub pulls native Intel PostgreSQL
          sed -i 's/--platform=linux\/arm64 //g' Dockerfile
          
          # 2. Swap Julia architecture in the download URL
          sed -i 's/aarch64/x64/g' Dockerfile
          sed -i 's/linux-x64/linux-x86_64/g' Dockerfile

      - name: Build PL/Julia and Run Tests
        run: docker build -t pljulia-ci --progress=plain --no-cache .