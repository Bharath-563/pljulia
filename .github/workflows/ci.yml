name: PL/Julia CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Run Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Native Intel Architecture
        run: |
          # Remove any platform flags and force Intel Postgres
          sed -i 's/--platform=[^ ]*//g' Dockerfile
          sed -i 's|^FROM .*|FROM postgres:14|g' Dockerfile
          
          # Force the Intel Julia download URL
          sed -i 's|https://julialang-s3.julialang.org/[^ ]*|https://julialang-s3.julialang.org/bin/linux/x64/1.10/julia-1.10.4-linux-x86_64.tar.gz|g' Dockerfile

      - name: Build PL/Julia and Run Tests
        run: docker build -t pljulia-ci --progress=plain --no-cache .